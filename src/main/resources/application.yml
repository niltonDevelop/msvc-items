# Micrometer Tracing — https://docs.micrometer.io/tracing/reference/
# Spring Boot 4: https://docs.spring.io/spring-boot/reference/actuator/tracing.html
management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
  observations:
    annotations:
      enabled: true

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false

# Resilience4j — instancia "products" (nombre en ProductClient.CIRCUIT_BREAKER_NAME)
spring:
  cloud:
    circuitbreaker:
      resilience4j:
        disable-time-limiter: false

resilience4j:
  timelimiter:
    instances:
      products:
        # Time limiter: timeout 3s (product id=7 duerme 5s → fallback)
        timeoutDuration: 3s
        cancelRunningFuture: true
  circuitbreaker:
    instances:
      products:
        # Abre con ≥50% fallos tras 5 llamadas en ventana de 10; OPEN 10s antes de HALF_OPEN
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 3s
